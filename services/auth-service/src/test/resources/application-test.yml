spring:
  application:
    name: auth-service-test

  datasource:
    url: jdbc:h2:mem:auth_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

urbanflow:
  jwt:
    issuer: urbanflow-auth-test
    access-token-ttl: PT15M
    refresh-token-ttl: P7D
    private-key: classpath:jwt/private-key.pem
    public-key: classpath:jwt/public-key.pem
