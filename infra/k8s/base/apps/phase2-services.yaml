---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-service
  labels:
    app.kubernetes.io/name: traffic-service
    app.kubernetes.io/part-of: urbanflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: traffic-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: traffic-service
    spec:
      containers:
        - name: traffic-service
          image: ghcr.io/ngmiguel/urbanflow/traffic-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: urbanflow-common
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: traffic-service
spec:
  selector:
    app.kubernetes.io/name: traffic-service
  ports:
    - port: 8082
      targetPort: 8082
