spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - AddResponseHeader=X-Gateway, urbanflow-api-gateway
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
