# Copy to secret.yaml and apply locally. Never commit real secrets.
apiVersion: v1
kind: Secret
metadata:
  name: urbanflow-secrets
  labels:
    app.kubernetes.io/part-of: urbanflow
type: Opaque
stringData:
  POSTGRES_PASSWORD: urbanflow
---
# JWT signing keys — create from local PEM files (do not edit by hand):
#   Windows:  .\scripts\apply-k8s-jwt-secret.ps1
#   Linux:    ./scripts/apply-k8s-jwt-secret.sh
#
# This creates/applies Secret "urbanflow-jwt-keys" with:
#   private-key.pem, public-key.pem
# Mounted at /run/secrets/jwt in auth-service.
