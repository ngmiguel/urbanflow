spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/analytics_db

  data:
    redis:
      host: redis
      port: 6379

  kafka:
    bootstrap-servers: kafka:9092

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://auth-service:8081/api/v1/auth/jwks
