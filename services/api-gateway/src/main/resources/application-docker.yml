spring:
  data:
    redis:
      host: redis
      port: 6379

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://auth-service:8081/api/v1/auth/jwks

  cloud:
    gateway:
      routes:
        - id: auth-service-public
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/register,/api/v1/auth/login,/api/v1/auth/refresh,/api/v1/auth/jwks
        - id: auth-service-protected
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: traffic-service
          uri: http://traffic-service:8082
          predicates:
            - Path=/api/v1/traffic/**
        - id: iot-device-service
          uri: http://iot-device-service:8083
          predicates:
            - Path=/api/v1/devices/**
        - id: incident-service
          uri: http://incident-service:8084
          predicates:
            - Path=/api/v1/incidents/**
        - id: alert-service
          uri: http://alert-service:8085
          predicates:
            - Path=/api/v1/alerts/**
        - id: environment-service
          uri: http://environment-service:8086
          predicates:
            - Path=/api/v1/environment/**
        - id: notification-service
          uri: http://notification-service:8087
          predicates:
            - Path=/api/v1/notifications/**
        - id: websocket-service
          uri: ws://websocket-service:8088
          predicates:
            - Path=/ws/**
        - id: sensor-simulator
          uri: http://sensor-simulator:8090
          predicates:
            - Path=/api/v1/simulator/**
        - id: digital-twin-service
          uri: http://digital-twin-service:8091
          predicates:
            - Path=/api/v1/twin/**
        - id: analytics-service
          uri: http://analytics-service:8092
          predicates:
            - Path=/api/v1/analytics/**
        - id: event-service
          uri: http://event-service:8093
          predicates:
            - Path=/api/v1/events/**

urbanflow:
  openapi:
    services:
      - name: auth-service
        display-name: Auth
        base-uri: http://auth-service:8081
      - name: traffic-service
        display-name: Traffic
        base-uri: http://traffic-service:8082
      - name: iot-device-service
        display-name: IoT Devices
        base-uri: http://iot-device-service:8083
      - name: incident-service
        display-name: Incidents
        base-uri: http://incident-service:8084
      - name: alert-service
        display-name: Alerts
        base-uri: http://alert-service:8085
      - name: environment-service
        display-name: Environment
        base-uri: http://environment-service:8086
      - name: notification-service
        display-name: Notifications
        base-uri: http://notification-service:8087
      - name: sensor-simulator
        display-name: Sensor Simulator
        base-uri: http://sensor-simulator:8090
      - name: digital-twin-service
        display-name: Digital Twin
        base-uri: http://digital-twin-service:8091
      - name: analytics-service
        display-name: Analytics
        base-uri: http://analytics-service:8092
      - name: event-service
        display-name: Urban Events
        base-uri: http://event-service:8093
