spring:
  application:
    name: api-gateway

  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8081/api/v1/auth/jwks

  cloud:
    gateway:
      default-filters:
        - AddResponseHeader=X-Gateway, urbanflow-api-gateway
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 20
            redis-rate-limiter.burstCapacity: 40
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@clientIpKeyResolver}"
      routes:
        - id: auth-service-public
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/register,/api/v1/auth/login,/api/v1/auth/refresh,/api/v1/auth/jwks
        - id: auth-service-protected
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: traffic-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/traffic/**
        - id: iot-device-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/devices/**
        - id: incident-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/incidents/**
        - id: alert-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/alerts/**
        - id: environment-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/environment/**
        - id: notification-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/notifications/**
        - id: websocket-service
          uri: ws://localhost:8088
          predicates:
            - Path=/ws/**
        - id: sensor-simulator
          uri: http://localhost:8090
          predicates:
            - Path=/api/v1/simulator/**
        - id: digital-twin-service
          uri: http://localhost:8091
          predicates:
            - Path=/api/v1/twin/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

urbanflow:
  gateway:
    cors:
      allowed-origins:
        - http://localhost:3000
        - http://localhost:8080
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      allow-credentials: true
