name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commit-policy:
    name: Reject Cursor co-author trailers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan commits for Cursor attribution
        run: |
          RANGE="${{ github.event_name == 'pull_request' && format('origin/{0}..HEAD', github.base_ref) || 'HEAD~20..HEAD' }}"
          if git log $RANGE --format=%B | grep -qiE 'co-authored-by:[[:space:]]*cursor|cursoragent@cursor\.com'; then
            echo "Commit message contains Cursor co-author attribution."
            echo "Disable Cursor Settings > Agents > Attribution > Commit Attribution."
            exit 1
          fi

  module-tests:
    name: Tests — ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - shared/urbanflow-common
          - shared/urbanflow-events
          - services/api-gateway
          - services/auth-service
          - services/traffic-service
          - services/iot-device-service
          - services/incident-service
          - services/alert-service
          - services/environment-service
          - services/notification-service
          - services/websocket-service
          - services/sensor-simulator
          - services/digital-twin-service
          - services/analytics-service
          - services/event-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run module tests
        run: mvn -B -pl "${{ matrix.module }}" -am test

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-${{ strategy.job-index }}
          path: |
            **/target/surefire-reports/*.xml
          retention-days: 7

  verify:
    name: Maven verify (full reactor)
    runs-on: ubuntu-latest
    needs: module-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run full verify
        run: mvn -B verify

  docker-smoke:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Gateway image
        run: docker build -f services/api-gateway/Dockerfile .

      - name: Build Auth Service image
        run: docker build -f services/auth-service/Dockerfile .

      - name: Build IoT Device Service image
        run: docker build -f services/iot-device-service/Dockerfile .

      - name: Build Event Service image
        run: docker build -f services/event-service/Dockerfile .
