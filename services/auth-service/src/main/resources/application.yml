spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: urbanflow
    password: urbanflow
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081

urbanflow:
  jwt:
    issuer: urbanflow-auth
    access-token-ttl: PT15M
    refresh-token-ttl: P7D
    private-key: classpath:jwt/private-key.pem
    public-key: classpath:jwt/public-key.pem

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.urbanflow.auth: INFO
