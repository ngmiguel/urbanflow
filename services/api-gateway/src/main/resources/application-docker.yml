spring:
  data:
    redis:
      host: redis
      port: 6379

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://auth-service:8081/api/v1/auth/jwks

  cloud:
    gateway:
      routes:
        - id: auth-service-public
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/register,/api/v1/auth/login,/api/v1/auth/refresh,/api/v1/auth/jwks
        - id: auth-service-protected
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: traffic-service
          uri: http://traffic-service:8082
          predicates:
            - Path=/api/v1/traffic/**
        - id: iot-device-service
          uri: http://iot-device-service:8083
          predicates:
            - Path=/api/v1/devices/**
        - id: incident-service
          uri: http://incident-service:8084
          predicates:
            - Path=/api/v1/incidents/**
        - id: alert-service
          uri: http://alert-service:8085
          predicates:
            - Path=/api/v1/alerts/**
        - id: environment-service
          uri: http://environment-service:8086
          predicates:
            - Path=/api/v1/environment/**
        - id: notification-service
          uri: http://notification-service:8087
          predicates:
            - Path=/api/v1/notifications/**
        - id: websocket-service
          uri: ws://websocket-service:8088
          predicates:
            - Path=/ws/**
